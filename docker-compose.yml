services:
  fuseki:
    image: stain/jena-fuseki:5.0.0
    container_name: fuseki
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx4g
    ports:
      - "3030:3030"
    volumes:
      - ./fuseki_data:/fuseki
      - ./gnd_db:/gnd_data:ro
      - ./fuseki-config:/fuseki/configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  gnd-loader:
    image: stain/jena-fuseki:5.0.0
    container_name: gnd-loader
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      - ./gnd_data:/gnd_data:ro
      - fuseki_db:/fuseki
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/load_gnd.sh"]
    restart: "no"
  RAG-pipeline:
    build: .
    image: fbnbgr/rag:latest
    command: ["python", "src/run_pipeline.py"]  
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./chroma_db:/app/chroma_db  
      - ./src:/app/src
      - ./data/evaluation:/app/data/evaluation
      - ./data/pdfs:/app/data/pdfs
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      fuseki:
        condition: service_healthy
  web-ui:
    build: .
    image: fbnbgr/rag:latest
    command: ["python", "src/web_ui.py"]
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    ports:
      - "5000:5000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./src:/app/src
      - ./data/evaluation:/app/data/evaluation
      - ./data/pdfs:/app/data/pdfs
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      fuseki:
        condition: service_healthy