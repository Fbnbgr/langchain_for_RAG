services:
  indexer:
    build: .
    volumes:
      - ./data/pdfs:/app/data/pdfs
      - ./chroma_db:/app/chroma_db
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "src/indexer.py"]

  retrieval:
    build: .
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./src:/app/src
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: ["python", "src/retrieval.py"]